name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-acs-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Strict ACS self-verification
        shell: pwsh
        run: ./scripts/Verify-AcsRepo.ps1

  build-spawn-tool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build C# template spawn tool
        run: dotnet build scripts/SpawnAcsTemplate.csproj -c Release
